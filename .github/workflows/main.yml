name: Build Research IPA (No Project)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build with Swift Package Manager
        run: |
          # Build the executable for iOS
          swift build -c release --triple arm64-apple-ios17.0-macabi \
            -Xswiftc -D -Xswiftc RELEASE \
            --scratch-path build

      - name: Create App Bundle and IPA
        run: |
          # Create a fake .app folder structure for sideloading
          mkdir -p Payload/ExploitApp.app
          cp build/release/ExploitApp Payload/ExploitApp.app/
          
          # Add a basic Info.plist so iOS recognizes it
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com">\n<plist version="1.0">\n<dict>\n<key>CFBundleExecutable</key><string>ExploitApp</string>\n<key>CFBundleIdentifier</key><string>com.research.exploit</string>\n<key>CFBundleName</key><string>ExploitApp</string>\n<key>CFBundleVersion</key><string>1.0</string>\n<key>LSRequiresIPhoneOS</key><true/>\n</dict>\n</plist>' > Payload/ExploitApp.app/Info.plist
          
          zip -r ExploitApp.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Sideload-Ready-IPA
          path: ExploitApp.ipa
