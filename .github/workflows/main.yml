name: Build Research IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Compile Swift for iOS
        run: |
          SDK_PATH=$(xcrun --show-sdk-path --sdk iphoneos)
          
          # This command finds EVERY .swift file in your repo automatically
          SWIFT_FILES=$(find . -name "*.swift" -not -path "*/.*")
          
          if [ -z "$SWIFT_FILES" ]; then
            echo "Error: No .swift files found in the repository!"
            exit 1
          fi

          echo "Compiling files: $SWIFT_FILES"
          
          # Manual compilation for arm64 (iPad iOS 18.2)
          swiftc $SWIFT_FILES \
            -sdk $SDK_PATH \
            -target arm64-apple-ios17.0 \
            -emit-executable \
            -o ExploitApp

      - name: Create App Bundle and IPA
        run: |
          mkdir -p Payload/ExploitApp.app
          mv ExploitApp Payload/ExploitApp.app/
          
          # Basic Info.plist for sideloading
          cat <<EOF > Payload/ExploitApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>ExploitApp</string>
              <key>CFBundleIdentifier</key><string>com.research.exploit</string>
              <key>CFBundleName</key><string>ExploitApp</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
          </dict>
          </plist>
          EOF
          
          zip -r ExploitApp.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Sideload-Ready-IPA
          path: ExploitApp.ipa
