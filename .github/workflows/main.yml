name: Build Research IPA (No Project)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Compile Swift for iOS
        run: |
          # 1. Get the path to the iPhoneOS SDK
          SDK_PATH=$(xcrun --show-sdk-path --sdk iphoneos)
          
          # 2. Compile all source files into a single executable
          # Target arm64 for your iPad (iOS 18.2)
          swiftc Sources/*.swift \
            -sdk $SDK_PATH \
            -target arm64-apple-ios17.0 \
            -emit-executable \
            -o ExploitApp

      - name: Create App Bundle and IPA
        run: |
          # 3. Create the required .app folder structure
          mkdir -p Payload/ExploitApp.app
          mv ExploitApp Payload/ExploitApp.app/
          
          # 4. Generate a basic Info.plist so the iPad recognizes it as an app
          cat <<EOF > Payload/ExploitApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ExploitApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.research.exploit</string>
              <key>CFBundleName</key>
              <string>ExploitApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
          </dict>
          </plist>
          EOF
          
          # 5. Zip it into the .ipa format
          zip -r ExploitApp.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Sideload-Ready-IPA
          path: ExploitApp.ipa
